version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-video-analyzer-web
    ports:
      - "5000:5000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FRAME_INTERVAL=${FRAME_INTERVAL:-2}
      - OUTPUT_DIR=/app/output_frames
      - FLASK_ENV=production
    volumes:
      - ./uploads:/app/uploads
      - ./output_frames:/app/output_frames
      - ./.env:/app/.env:ro
    working_dir: /app
    command: python app.py --host 0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
